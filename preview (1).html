<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사육용 도마뱀 가이드 (온라인 버전)</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#eef5ef;color:#333;transition:0.3s;}
body.dark{background:#1c1c1c;color:white;}
header{background:#2e7d32;color:white;padding:20px;text-align:center;}
.controls{display:flex;justify-content:center;gap:10px;margin:20px;flex-wrap:wrap;}
input,select,button{padding:8px;border-radius:6px;border:1px solid #ccc;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);cursor:pointer;transition:0.3s;}
body.dark .card{background:#2a2a2a;}
.card:hover{transform:scale(1.03);}
.card img{width:100%;height:160px;object-fit:cover;}
.card-content{padding:15px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;}
.modal-content{background:white;padding:20px;border-radius:10px;max-width:500px;}
body.dark .modal-content{background:#2a2a2a;}
.cost{padding:30px;background:#f1f7f2;}
body.dark .cost{background:#222;}
footer{text-align:center;padding:15px;background:#333;color:white;}
</style>
</head>
<body>
<header>
<h1>🦎 사육용 도마뱀 가이드</h1>
<p>온라인에서 바로 도마뱀 정보를 확인하세요</p>
</header>

<div class="controls">
<input type="text" id="search" placeholder="도마뱀 검색">
<select id="difficulty">
<option value="all">난이도 전체</option>
<option value="쉬움">초보자용</option>
<option value="보통">중급</option>
<option value="어려움">고급</option>
</select>
<button onclick="toggleDark()">다크모드</button>
</div>

<div class="container" id="lizardContainer"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<section class="cost">
<h2>초기 사육 비용</h2>
<ul>
<li>사육장 : 약 5만 ~ 20만원</li>
<li>UVB 조명 : 약 3만 ~ 8만원</li>
<li>히팅 램프 : 약 2만 ~ 5만원</li>
<li>먹이 : 월 1만 ~ 3만원</li>
<li>바닥재 : 약 1만 ~ 3만원</li>
</ul>
</section>

<footer>
<p>© 2026 Lizard Care Guide</p>
</footer>

<script>
const lizards=[
{name:"레오파드 게코",difficulty:"쉬움",price:"4만~13만원",life:"15~20년",food:"귀뚜라미, 밀웜",temp:"26~32°C",humidity:"30~40%",size:"20갤런 이상",img:"https://upload.wikimedia.org/wikipedia/commons/1/1f/Leopard_gecko.jpg",desc:"초보자가 키우기 쉬운 대표적인 도마뱀."},
{name:"크레스티드 게코",difficulty:"쉬움",price:"5만~15만원",life:"15년",food:"곤충, 과일",temp:"22~26°C",humidity:"60~70%",size:"세로형 테라리움",img:"https://upload.wikimedia.org/wikipedia/commons/7/70/Crested_gecko.jpg",desc:"나무에서 생활하는 귀여운 도마뱀."},
{name:"비어디드 드래곤",difficulty:"보통",price:"8만~20만원",life:"10~15년",food:"곤충, 채소",temp:"38~40°C",humidity:"30~40%",size:"75갤런 이상",img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Bearded_dragon.jpg",desc:"사람과 교감이 가능한 인기 도마뱀."},
{name:"블루텅 스킨크",difficulty:"보통",price:"30만~80만원",life:"20년",food:"잡식",temp:"24~30°C",humidity:"40~60%",size:"큰 사육장 필요",img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Blue_tongued_skink.jpg",desc:"푸른 혀가 특징인 대형 도마뱀."},
{name:"모니터 도마뱀",difficulty:"어려움",price:"100만원 이상",life:"20년 이상",food:"고기, 곤충",temp:"30~35°C",humidity:"50~70%",size:"매우 큰 사육장",img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Monitor_lizard.jpg",desc:"경험 많은 사육자에게 추천되는 도마뱀."}
];

function renderLizards(){
const container=document.getElementById("lizardContainer");
const search=document.getElementById("search").value.toLowerCase();
const diff=document.getElementById("difficulty").value;
container.innerHTML="";
lizards
.filter(l=>l.name.toLowerCase().includes(search))
.filter(l=>diff==="all" || l.difficulty===diff)
.forEach(l=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${l.img}"><div class="card-content"><h3>${l.name}</h3><p>가격: ${l.price}</p><p>난이도: ${l.difficulty}</p></div>`;
card.onclick=()=>showDetail(l);
container.appendChild(card);
});
}

function showDetail(l){
const modal=document.getElementById("modal");
const content=document.getElementById("modalContent");
content.innerHTML=`<h2>${l.name}</h2><p><b>평균 수명:</b> ${l.life}</p><p><b>사육장:</b> ${l.size}</p><p><b>먹이:</b> ${l.food}</p><p><b>온도:</b> ${l.temp}</p><p><b>습도:</b> ${l.humidity}</p><p>${l.desc}</p><button onclick="closeModal()">닫기</button>`;
modal.style.display="flex";
}

function closeModal(){document.getElementById("modal").style.display="none";}
document.getElementById("search").addEventListener("input",renderLizards);
document.getElementById("difficulty").addEventListener("change",renderLizards);
function toggleDark(){document.body.classList.toggle("dark");}
renderLizards();
</script>
</body>
</html>
